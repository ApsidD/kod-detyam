<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Урок 3 · Краски</title>
<link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
<div id="урок"></div>

<script src="../shared/curriculum.js"></script>
<script src="../shared/engine.js"></script>
<script src="../shared/lesson.js"></script>
<script>
Урок.создать({
  номер: 3,
  значок: "🎨",
  интро: 'Одним словом ты меняешь весь мир. Пишешь <code>фон("закат")</code> — и небо станет закатным. Жми по картинкам снизу или меняй слово в коде.',
  сцена: { фон: "свой" },
  стартовыйКод: 'фон("небо")\nгерой.картинка = "🐱"\nгерой.размер = 130',
  сборка: function (мир, дв) {
    var ПРЕСЕТЫ = {
      небо:   { верх: "#7EC8FF", низ: "#CDEEFF" },
      море:   { верх: "#2E9BD6", низ: "#0B4D8C" },
      закат:  { верх: "#FF9E7D", низ: "#FFC46E" },
      ночь:   { верх: "#10204F", низ: "#05070F" },
      космос: { верх: "#3B2E7E", низ: "#0B1026" },
      трава:  { верх: "#A7E070", низ: "#4E9A44" },
      лава:   { верх: "#FF6A3C", низ: "#8E1A12" },
      снег:   { верх: "#EAF6FF", низ: "#BEE0F2" }
    };
    var состояние = { фон: null };
    var герой = { картинка: "🐱", вправо: 240, вниз: 250, размер: 130 };
    мир.очистить(); мир.добавить(герой);
    дв.установитьФон(ПРЕСЕТЫ.небо.верх, ПРЕСЕТЫ.небо.низ);
    function фон(имя) {
      var p = ПРЕСЕТЫ[имя];
      if (p) { состояние.фон = имя; дв.установитьФон(p.верх, p.низ); }
    }
    return { фон: фон, герой: герой, __сост: состояние };
  },
  палитра: {
    подпись: "Клик — поменять фон:",
    эмодзи: ["🟦","🌊","🌅","🌃","🌌","🟩","🌋","❄️"],
    вставить: function (e, код) {
      var карта = { "🟦":"небо","🌊":"море","🌅":"закат","🌃":"ночь","🌌":"космос","🟩":"трава","🌋":"лава","❄️":"снег" };
      var имя = карта[e] || "небо";
      var L = код.split("\n");
      for (var i = 0; i < L.length; i++) {
        if (L[i].indexOf("фон(") >= 0) { L[i] = 'фон("' + имя + '")'; return L.join("\n"); }
      }
      L.unshift('фон("' + имя + '")'); return L.join("\n");
    }
  },
  задания: [
    { текст: "Нажми Запуск — раскрась сцену",
      подсказка: "Жми зелёную ▶ Запуск.",
      проверка: function (м, а) { return true; } },
    { текст: "Опусти на сцену ночь",
      подсказка: "Нажми 🌃 внизу — или в коде напиши фон(\"ночь\").",
      проверка: function (м, а) { return а.__сост.фон === "ночь"; } },
    { текст: "Устрой закат",
      подсказка: "Нажми 🌅 — или фон(\"закат\").",
      проверка: function (м, а) { return а.__сост.фон === "закат"; } },
    { текст: "Отправь героя в космос",
      подсказка: "Нажми 🌌 — или фон(\"космос\").",
      проверка: function (м, а) { return а.__сост.фон === "космос"; } },
    { текст: "Своя планета — любой фон, кроме неба, и свой герой",
      подсказка: "Выбери любой цвет (не небо) и поменяй кота на дракона, ракету — кого хочешь.",
      проверка: function (м, а) {
        return !!а.__сост.фон && а.__сост.фон !== "небо" && String(а.герой.картинка).trim() !== "🐱";
      } }
  ],
  победа: {
    текст: "Ты раскрасил свой мир и населил его.",
    подпись: "Дальше — соберёшь стартовую заставку своей игры."
  },
  футер: "Взрослому рядом: пусть перебирает цвета кликами и словами — ошибиться тут нельзя, всё чинит ↺."
});
</script>
</body>
</html>
