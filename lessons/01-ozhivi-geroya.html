<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Урок 1 · Оживи героя</title>
<link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
<div id="урок"></div>

<script src="../shared/curriculum.js"></script>
<script src="../shared/engine.js"></script>
<script src="../shared/lesson.js"></script>
<script>
Урок.создать({
  номер: 1,
  значок: "🎮",
  интро: 'Это твоя игра. Крути ручки прямо в коде — герой меняется сразу же, без всяких кнопок.',
  сцена: { фон: "космос", линейка: "светлая" },
  строкиКода: [
    { текст: 'герой.картинка = ',
      слот: { ключ: "картинка", вид: "выбор", старт: "🐱",
              опции: ["🐱","🐶","🐉","🦖","🚀","⭐","🍎","🐠","🤖","👾","🐢","🦄"] } },
    { текст: 'герой.размер = ',
      слот: { ключ: "размер", вид: "число", старт: 110, мин: 20, макс: 300, шаг: 10 } },
    { текст: 'герой.вправо = ',
      слот: { ключ: "вправо", вид: "число", старт: 240, мин: 0, макс: 480, шаг: 10 } },
    { текст: 'герой.вниз = ',
      слот: { ключ: "вниз", вид: "число", старт: 240, мин: 0, макс: 480, шаг: 10 } }
  ],
  применить: function (мир, дв, з) {
    var г = { картинка: з.картинка, вправо: з.вправо, вниз: з.вниз, размер: з.размер };
    мир.очистить(); мир.добавить(г);
    return { герой: г };
  },
  читалка: function (а) {
    return "вправо " + Math.round(а.герой.вправо) + "   ·   вниз " + Math.round(а.герой.вниз);
  },
  задания: [
    { текст: "Сделай героя огромным — размер 180 или больше",
      подсказка: "Жми + у строки «размер», пока не станет 180 или больше.",
      проверка: function (м, а) { return Number(а.герой.размер) >= 180; } },
    { текст: "Сделай героя крошечным — размер 50 или меньше",
      подсказка: "Теперь жми − у «размера» до 50 или меньше.",
      проверка: function (м, а) { return Number(а.герой.размер) <= 50; } },
    { текст: "Отправь героя в правый верхний угол",
      подсказка: "«вправо» крути побольше (ближе к 480), «вниз» — поменьше (ближе к 0).",
      проверка: function (м, а) { return Number(а.герой.вправо) >= 330 && Number(а.герой.вниз) <= 150; } },
    { текст: "Выбери своего героя — поменяй кота на кого хочешь",
      подсказка: "Открой список у строки «картинка» и выбери дракона, ракету — кого хочешь!",
      проверка: function (м, а) { var v = String(а.герой.картинка).trim(); return v !== "🐱" && v !== ""; } }
  ],
  победа: {
    текст: "Ты запрограммировал своего первого героя.",
    подпись: "Дальше — герой начнёт двигаться сам."
  },
  футер: "Взрослому рядом: дай ему покрутить ручки самому — сломать тут нечего, всё меняется вживую."
});
</script>
</body>
</html>
