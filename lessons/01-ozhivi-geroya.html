<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Урок 1 · Оживи героя</title>
<link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
<div id="урок"></div>

<script src="../shared/curriculum.js"></script>
<script src="../shared/engine.js"></script>
<script src="../shared/lesson.js"></script>
<script>
Урок.создать({
  номер: 1,
  значок: "🎮",
  интро: 'Это твоя игра. Меняй код справа, жми <b>Запуск</b> — герой сделает то, что ты написал.',
  сцена: { фон: "космос", линейка: "светлая" },
  стартовыйКод: 'герой.картинка = "🐱"\nгерой.вправо = 240\nгерой.вниз = 240\nгерой.размер = 110',
  сборка: function (мир) {
    var г = { картинка: "🐱", вправо: 240, вниз: 240, размер: 110 };
    мир.очистить(); мир.добавить(г);
    return { герой: г };
  },
  читалка: function (а) {
    return "вправо " + Math.round(а.герой.вправо) + "   ·   вниз " + Math.round(а.герой.вниз);
  },
  палитра: {
    эмодзи: ["🐱","🐶","🐉","🦖","🚀","⭐","🍎","🐠","🤖","👾","🐢","🦄"],
    вставить: function (e, код) {
      var L = код.split("\n");
      for (var i = 0; i < L.length; i++) {
        if (L[i].indexOf("герой.картинка") >= 0) { L[i] = 'герой.картинка = "' + e + '"'; return L.join("\n"); }
      }
      L.unshift('герой.картинка = "' + e + '"'); return L.join("\n");
    }
  },
  задания: [
    { текст: "Нажми Запуск — оживи героя",
      подсказка: "Просто нажми зелёную кнопку ▶ Запуск.",
      проверка: function (м, а) { return true; } },
    { текст: "Сделай героя огромным — размер 180 или больше",
      подсказка: "Найди строчку «размер = 110» и поставь 180 или больше — например 200.",
      проверка: function (м, а) { return Number(а.герой.размер) >= 180; } },
    { текст: "Сделай героя крошечным — размер 50 или меньше",
      подсказка: "Теперь поставь размер 50 или меньше — например 30.",
      проверка: function (м, а) { return Number(а.герой.размер) <= 50; } },
    { текст: "Отправь героя в правый верхний угол",
      подсказка: "Поставь «вправо» побольше (например 420), «вниз» поменьше (например 80).",
      проверка: function (м, а) { return Number(а.герой.вправо) > 330 && Number(а.герой.вниз) < 150; } },
    { текст: "Выбери своего героя — поменяй кота на кого хочешь",
      подсказка: "Жми по эмодзи под кодом — выбери дракона, ракету, кого хочешь!",
      проверка: function (м, а) { var v = String(а.герой.картинка).trim(); return v !== "🐱" && v !== ""; } }
  ],
  победа: {
    текст: "Ты запрограммировал своего первого героя.",
    подпись: "Дальше — герой начнёт двигаться сам."
  },
  футер: "Взрослому рядом: дай ему жать Запуск и пробовать самому — ошибиться тут не страшно, всё чинит кнопка ↺."
});
</script>
</body>
</html>
