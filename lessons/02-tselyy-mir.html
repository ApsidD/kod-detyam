<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Урок 2 · Целый мир</title>
<link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
<div id="урок"></div>

<script src="../shared/curriculum.js"></script>
<script src="../shared/engine.js"></script>
<script src="../shared/lesson.js"></script>
<script>
Урок.создать({
  номер: 2,
  значок: "🌍",
  интро: 'В прошлый раз ты оживил одного героя. Сегодня построй <b>целый мир</b> из многих. Каждая строчка <code>добавь({…})</code> ставит объект, и в ней всё подписано: <b>предмет</b> — кто это, <b>вправо</b> и <b>вниз</b> — место, <b>размер</b> — величина.',
  сцена: { фон: "мир", линейка: "тёмная" },
  стартовыйКод:
    'добавь({ предмет:"🌳", вправо:150, вниз:240, размер:80 })\n' +
    'добавь({ предмет:"🏠", вправо:300, вниз:240, размер:80 })\n' +
    'добавь({ предмет:"🐱", вправо:400, вниз:250, размер:70 })',
  сборка: function (мир) {
    мир.очистить();
    function добавь(н) {
      н = н || {};
      мир.добавить({
        картинка: String(н.предмет !== undefined ? н.предмет : "❓"),
        вправо: Number(н.вправо) || 0,
        вниз: Number(н.вниз) || 0,
        размер: Math.max(6, Number(н.размер) || 40)
      });
    }
    return { добавь: добавь };
  },
  палитра: {
    подпись: "Клик — добавить объект в мир:",
    эмодзи: ["🌳","🌲","🏠","☀️","☁️","🌸","🐱","🐶","🚗","🦋","⛰️","🌈","🪨","🐦"],
    вставить: function (e, код) {
      var в = Math.round(40 + Math.random() * 400);
      var н = Math.round(70 + Math.random() * 300);
      var s = Math.round(50 + Math.random() * 30);
      var строка = 'добавь({ предмет:"' + e + '", вправо:' + в + ', вниз:' + н + ', размер:' + s + ' })';
      return (код.trim().length ? код.replace(/\s*$/, "") + "\n" : "") + строка;
    }
  },
  задания: [
    { текст: "Построй мир — нажми Запуск",
      подсказка: "Жми зелёную ▶ Запуск — увидишь свои объекты на экране.",
      проверка: function (м, а) { return true; } },
    { текст: "Подними что-нибудь в небо — «вниз» 100 или меньше",
      подсказка: "«вниз» — это высота. Маленькое = вверху (небо). Поставь вниз:60 (годится любое 100 и меньше).",
      проверка: function (м, а) { return м.объекты.some(function (o) { return o.вниз <= 100; }); } },
    { текст: "Поставь что-нибудь на землю — «вниз» 320 или больше",
      подсказка: "Большое «вниз» = внизу (земля). Поставь вниз:350 (годится любое 320 и больше).",
      проверка: function (м, а) { return м.объекты.some(function (o) { return o.вниз >= 320; }); } },
    { текст: "Наполни мир — 6 объектов или больше",
      подсказка: "Кликай по эмодзи снизу — каждый клик добавляет объект. Или скопируй строчку добавь({…}).",
      проверка: function (м, а) { return м.объекты.length >= 6; } },
    { текст: "Огромный мир — 12 объектов или больше",
      подсказка: "Ещё! Накликай или накопируй объектов, пока их не станет 12.",
      проверка: function (м, а) { return м.объекты.length >= 12; } }
  ],
  победа: {
    текст: function (м, а) { return "Ты построил целый мир из " + м.объекты.length + " объектов."; },
    подпись: "Дальше — раскрасишь его в свои цвета."
  },
  футер: "Взрослому рядом: клик по эмодзи добавляет объект; «вправо» и «вниз» — это его место, «размер» — величина. Ошибиться не страшно — всё чинит ↺."
});
</script>
</body>
</html>
